<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col max-w-[1280px] mx-auto overflow-hidden">
<!-- TopAppBar -->
<header class="bg-background border-b border-outline-variant/20 grid grid-cols-3 items-center px-margin-desktop h-16 w-full sticky top-0 z-50">
<div class="flex items-center gap-8">

<h1 class="font-display text-2xl font-bold text-primary">Sandoichi</h1>
</div>
</div><nav class="flex items-center justify-center gap-1">
<a class="flex items-center gap-2 px-4 py-2 text-sm rounded-lg text-primary font-bold border-b-2 border-primary pb-1" href="#"><span class="material-symbols-outlined text-[20px]">point_of_sale</span>Ventas</a>
<a class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-on-surface-variant hover:bg-surface-container transition-colors rounded-lg" href="#"><span class="material-symbols-outlined text-[20px]">inventory_2</span>Inventario</a>
<a class="flex items-center gap-2 px-4 py-2 text-sm font-medium text-on-surface-variant hover:bg-surface-container transition-colors rounded-lg" href="#"><span class="material-symbols-outlined text-[20px]">bar_chart</span>Reportes</a>
</nav>
<div class="flex items-center gap-2 justify-end"><div class="relative flex items-center w-64">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant text-[20px]">search</span>
<input class="w-full bg-surface-container border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20 h-10" placeholder="Buscar transacciones o productos..." type="text">
</div>
<button class="p-2 hover:bg-surface-container rounded-full transition-colors" title="Historial de ventas">
<span class="material-symbols-outlined text-on-surface-variant">history</span>
</button>
<button class="p-2 hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">settings</span>
</button>
</div>
</header>
<!-- Main Content: Multipago -->
<main class="flex-grow grid grid-cols-12 gap-0 h-[calc(780px-64px)]">
<!-- Left: Payment Controls -->
<section class="col-span-12 lg:col-span-8 p-margin-desktop flex flex-col overflow-y-auto">
<div class="mb-gutter">
<h2 class="font-display-lg text-display-lg text-primary uppercase tracking-wider mb-2">MULTIPAGO</h2>
<div class="h-1 w-24 bg-secondary-container"></div>
</div>
<!-- Fast Cash Options -->
<div class="grid grid-cols-3 gap-gutter mb-4">
<button class="bg-surface-container-lowest border border-outline/20 flex flex-col items-center justify-center hover:bg-surface-container-highest active:scale-95 transition-all group h-24" onclick="handlePayment(100)">
<span class="text-secondary font-headline-lg text-headline-lg">$100</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mt-2 group-hover:text-primary transition-colors">Efectivo</span>
</button>
<button class="bg-surface-container-lowest border border-outline/20 flex flex-col items-center justify-center hover:bg-surface-container-highest active:scale-95 transition-all group h-24" onclick="handlePayment(200)">
<span class="text-secondary font-headline-lg text-headline-lg">$200</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mt-2 group-hover:text-primary transition-colors">Efectivo</span>
</button>
<button class="bg-surface-container-lowest border border-outline/20 flex flex-col items-center justify-center hover:bg-surface-container-highest active:scale-95 transition-all group h-24" onclick="handlePayment(500)">
<span class="text-secondary font-headline-lg text-headline-lg">$500</span>
<span class="font-label-md text-label-md text-on-surface-variant uppercase tracking-widest mt-2 group-hover:text-primary transition-colors">Efectivo</span>
</button>
</div>
<!-- Alternative Payment -->
<div class="grid grid-cols-2 gap-gutter mb-auto">
<button class="bg-surface-container border border-outline/20 flex items-center justify-center gap-4 hover:bg-surface-container-highest active:scale-95 transition-all h-20">
<span class="material-symbols-outlined text-tertiary text-3xl">credit_card</span>
<span class="font-headline-md text-headline-md text-on-surface uppercase">Tarjeta</span>
</button>
<div class="bg-surface-container-low border border-outline/20 flex flex-col p-4 h-20">
<span class="font-label-md text-label-md text-on-surface-variant uppercase mb-1">Monto Personalizado</span>
<div class="flex items-center gap-2">
<span class="font-headline-md text-headline-md text-primary">$</span>
<input class="w-full bg-transparent border-b border-outline focus:border-primary focus:ring-0 font-headline-md text-headline-md p-0" id="custom-amount" placeholder="0.00" type="number">
</div>
</div>
</div>
<!-- Bottom Actions Layout -->
<div class="flex justify-between items-end mt-gutter">
<button class="h-16 px-12 border-2 border-tertiary text-tertiary font-headline-md text-headline-md uppercase hover:bg-tertiary hover:text-white transition-all flex items-center gap-2" onclick="window.history.back()">
<span class="material-symbols-outlined">arrow_back</span>
                    Cancelar
                </button>
</div>
</section>
<!-- Right: Order Summary & Change -->
<aside class="col-span-12 lg:col-span-4 bg-surface-container-low border-l border-outline-variant/20 flex flex-col p-margin-desktop relative overflow-y-auto">
<div class="mb-gutter">
<h3 class="font-headline-md text-headline-md text-on-surface border-b border-outline/20 pb-2 mb-4">Resumen de Orden</h3>
<!-- Simple Order Table -->
<div class="space-y-2 mb-gutter max-h-[30vh] overflow-y-auto">
<div class="flex justify-between items-center py-2 border-b border-outline/10">
<div class="flex flex-col">
<span class="font-label-lg text-label-lg">Morning bliss</span>
<span class="text-xs text-on-surface-variant">x1 pieza</span>
</div>
<span class="font-label-lg text-label-lg">$55.00</span>
</div>
</div>
<div class="mt-6 space-y-2">
<div class="flex justify-between text-on-surface-variant font-label-md text-label-md">
<span class="">Subtotal</span>
<span class="">$55.00</span>
</div>
<div class="flex justify-between text-on-surface-variant font-label-md text-label-md">
<span class="">IVA (16%)</span>
<span class="">$8.80</span>
</div>
<div class="flex justify-between items-end pt-4">
<span class="font-headline-md text-headline-md text-on-surface uppercase">Total</span>
<span class="font-display-lg text-display-lg text-primary font-bold" id="order-total">$63.80</span>
</div>
</div>
</div>
<!-- Change Display Area (Sticky Bottom Right context) -->
<div class="mt-auto pt-6 border-t-2 border-dashed border-outline/20">
<div class="mb-2 flex justify-between items-center">
<span class="font-label-lg text-label-lg text-on-surface-variant uppercase tracking-widest">Recibido</span>
<span class="font-headline-md text-headline-md text-on-surface-variant" id="received-amount">$0.00</span>
</div>
<!-- The "Arroja cambio de monto seleccionado" Area -->
<div class="bg-primary text-on-primary p-6 shadow-xl relative overflow-hidden group">
<div class="absolute top-0 right-0 p-2 opacity-10">
<span class="material-symbols-outlined text-6xl">payments</span>
</div>
<span class="font-label-md text-label-md uppercase tracking-[0.2em] opacity-80 block mb-1">Cambio a Entregar</span>
<div class="flex items-baseline justify-between">
<span class="font-display-lg text-display-lg font-extrabold tracking-tight" id="change-display">$0.00</span>
<span class="material-symbols-outlined text-secondary-container">arrow_forward</span>
</div>
</div>
<button class="w-full mt-4 h-16 bg-secondary-container text-on-secondary-container font-headline-md text-headline-md uppercase hover:brightness-105 active:scale-[0.98] transition-all flex items-center justify-center gap-3">
                    Finalizar Pago
                    <span class="material-symbols-outlined">check_circle</span>
</button>
</div>
</aside>
</main>
<!-- BottomNavBar (Mobile Only) -->
<nav class="md:hidden fixed bottom-0 left-0 w-full z-50 flex items-stretch bg-surface-container-low border-t border-outline-variant/20 h-[72px] justify-center">
<button class="flex flex-col items-center justify-center text-on-surface-variant h-full hover:bg-surface-container-highest transition-all px-4">
<span class="material-symbols-outlined">pending_actions</span>
<span class="font-label-lg text-label-lg">Pendientes</span>
</button>
<button class="flex flex-col items-center justify-center bg-secondary-container text-on-secondary-container rounded-none h-full scale-95 transition-transform duration-100 px-4">
<span class="material-symbols-outlined">account_balance_wallet</span>
<span class="font-label-lg text-label-lg">Multipago</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant h-full hover:bg-surface-container-highest transition-all px-4">
<span class="material-symbols-outlined">payments</span>
<span class="font-label-lg text-label-lg">Pago exacto</span>
</button>
<button class="flex flex-col items-center justify-center text-on-surface-variant h-full hover:bg-surface-container-highest transition-all px-4">
<span class="material-symbols-outlined" data-weight="fill">cancel</span>
<span class="font-label-lg text-label-lg">Cancelar</span>
</button>
</nav>
<script>
        const total = 63.80;
        let received = 0;

        function handlePayment(amount) {
            received = amount;
            updateDisplay();
            
            // Visual feedback interaction
            const display = document.getElementById('change-display');
            display.classList.add('scale-110');
            setTimeout(() => display.classList.remove('scale-110'), 150);
        }

        function updateDisplay() {
            const change = Math.max(0, received - total);
            document.getElementById('received-amount').innerText = `$${received.toFixed(2)}`;
            document.getElementById('change-display').innerText = `$${change.toFixed(2)}`;
            
            // Highlight if sufficient payment
            const container = document.getElementById('change-display').parentElement.parentElement;
            if (received >= total) {
                container.classList.add('ring-4', 'ring-secondary-container');
            } else {
                container.classList.remove('ring-4', 'ring-secondary-container');
            }
        }

        document.getElementById('custom-amount').addEventListener('input', (e) => {
            received = parseFloat(e.target.value) || 0;
            updateDisplay();
        });
    </script>
</body></html>

<h1 class="font-display-lg text-xl font-bold text-primary">Sandoichi</h1>
</div>
<nav class="flex items-center gap-1">
<a class="px-4 py-2 text-sm font-bold flex items-center gap-2 border-b-2 border-primary pb-1 text-primary" href="#">

                </a>
<a class="px-4 py-2 text-sm font-medium text-on-surface-variant hover:bg-surface-container transition-colors rounded-lg flex items-center gap-2" href="#">

                </a>
<a class="px-4 py-2 text-sm font-medium text-on-surface-variant hover:bg-surface-container transition-colors rounded-lg flex items-center gap-2" href="#">

</div>
<div class="w-64 px-2">
<div class="relative flex items-center">
<span class="material-symbols-outlined absolute left-3 text-on-surface-variant">search</span>
<input class="w-full bg-surface-container border-none rounded-full py-2 pl-10 pr-4 text-sm focus:ring-2 focus:ring-primary/20" placeholder="Buscar..." type="text">
</div>

<div class="flex items-center gap-2">
<button class="p-2 hover:bg-surface-container rounded-full transition-colors" title="Historial de ventas"><span class="material-symbols-outlined text-on-surface-variant">history</span></button>
<button class="p-2 hover:bg-surface-container rounded-full transition-colors">
<span class="material-symbols-outlined text-on-surface-variant">settings</span>
</button>
</div>
</header>
<main class="flex-1 flex overflow-hidden order-pattern">
<!-- Content Canvas -->
<div class="flex-1 p-8 flex flex-col items-center justify-between overflow-y-auto">
<!-- Main Success Message -->
<div class="text-center mt-4">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-primary text-on-primary mb-4 shadow-md">
<span class="material-symbols-outlined !text-4xl" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
<h2 class="font-display-lg text-3xl text-primary uppercase tracking-wider mb-1">Venta Exitosa</h2>
<p class="font-body-md text-on-surface-variant">La transacción se ha completado correctamente.</p>
</div>
<!-- TICKET BOX -->
<div class="w-full max-w-2xl bg-white border border-outline-variant/30 p-8 rounded-xl shadow-sm flex flex-col items-center">
<h3 class="font-label-lg text-lg text-on-surface-variant uppercase tracking-[0.2em] mb-8 pb-1 border-b-2 border-secondary-container">TICKET</h3>
<!-- Action Buttons Cluster - Optimized horizontal space -->
<div class="grid grid-cols-2 gap-6 w-full">
<!-- IMPRIMIR TICKET -->
<button class="group flex flex-col items-center justify-center gap-3 py-10 border-2 border-primary text-primary hover:bg-primary hover:text-white transition-all duration-200 rounded-lg active:scale-95">
<span class="material-symbols-outlined !text-5xl group-hover:scale-110 transition-transform">print</span>
<span class="font-label-lg uppercase tracking-widest text-sm">Imprimir Ticket</span>
</button>
<!-- NO IMPRIMIR -->
<button class="group flex flex-col items-center justify-center gap-3 py-10 border-2 border-outline text-outline hover:bg-outline hover:text-white transition-all duration-200 rounded-lg active:scale-95">
<span class="material-symbols-outlined !text-5xl group-hover:scale-110 transition-transform">block</span>
<span class="font-label-lg uppercase tracking-widest text-sm">No Imprimir</span>
</button>
</div>
</div>
<!-- Global Action - Prominent but integrated -->
<div class="w-full max-w-2xl mb-4">
<button class="w-full h-14 bg-secondary-container text-on-secondary-container font-headline-md text-xl flex items-center justify-center gap-3 rounded-lg hover:bg-secondary-fixed shadow-md hover:shadow-lg transition-all active:scale-[0.98]">
<span class="material-symbols-outlined">add_shopping_cart</span>
                    NUEVA VENTA
                </button>
</div>

</div>

<div class="p-6 space-y-4">

</div>
<div class="flex justify-between text-on-surface-variant">
<span class="font-label-md uppercase">IVA (16%)</span>

</div>
</div>
</div>
<div class="p-6 bg-white border-t border-outline-variant/30 space-y-4">

<span class="font-display-lg text-3xl font-bold">$63.80</span>
</div>
<div class="p-4 bg-primary/5 rounded-lg border border-primary/10 flex items-center gap-3">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">payments</span>
<span class="font-label-md text-primary font-bold uppercase text-xs">Pagado con Tarjeta</span>
</div>
</div>
</aside>
</main>
<!-- Interactive micro-feedback script -->
<script>
        document.querySelectorAll('button').forEach(btn => {
            btn.addEventListener('click', () => {
                const isNewSale = btn.innerText.includes('NUEVA VENTA');
                if (isNewSale) {
                    const originalHTML = btn.innerHTML;
                    btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> PROCESANDO...';
                    btn.disabled = true;
                    setTimeout(() => {
                        window.location.reload();
                    }, 800);
                } else {
                    const icon = btn.querySelector('.material-symbols-outlined');
                    if (icon) {
                        icon.style.transform = 'scale(1.2)';
                        setTimeout(() => {
                            icon.style.transform = 'scale(1)';
                        }, 200);
                    }
                }
            });
        });
    </script>

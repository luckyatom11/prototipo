        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;

<body class="bg-surface text-on-surface font-body-md flex flex-col min-h-screen">
<!-- TopNavBar Shell (Suppressed items for login focus) -->
<header class="bg-surface dark:bg-surface-dim border-b border-outline-variant/20 docked full-width top-0 z-50">
<nav class="flex justify-between items-center w-full px-margin-desktop py-4">
<div class="text-headline-md font-headline-md text-primary dark:text-primary-fixed">
                Sandoichi
            </div>
<div class="flex gap-4 items-center">
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:bg-surface-container-high transition-colors p-2 rounded-full" data-icon="help">help</span>
<span class="material-symbols-outlined text-on-surface-variant cursor-pointer hover:bg-surface-container-high transition-colors p-2 rounded-full" data-icon="settings">settings</span>
</div>
</nav>
</header>
<!-- Main Content: Login Canvas -->
<main class="flex-grow flex items-center justify-center p-margin-mobile md:p-margin-desktop">
<div class="w-full max-w-md bg-surface-container-lowest dark:bg-surface-container shadow-sm border border-outline-variant/20 rounded-xl overflow-hidden transition-all duration-300 hover:shadow-md">
<!-- Branding Header -->
<div class="pt-8 pb-4 flex flex-col items-center">
<div class="w-32 h-32 mb-6 rounded-full overflow-hidden bg-surface-container-highest flex items-center justify-center">
<img alt="Sandoichi Mascot" class="w-full h-full object-cover" src="https://lh3.googleusercontent.com/aida-public/AB6AXuBBXxXMBRzJGTXYdT4Bec8oURGh-re2wjLN8r08dm3X3BHTl28nqU6FKead0n-_GXn_E6-MiESZkx976NTkmKYerOMVYW7pPdFmNLdoeJt88w3Jl9WbQu4lmhl6VM_6Wc4foD5zA4hV3G8grK7GNYzMIduzn4hk4wYXwbJO65sYZ38AoQkJ_jcXRMleopuktDZ1yy1ZdHwQztlg7C7tQNIJS_bwZNrNaEyIhjsYdgFnvcCqCSGfHTPO2n-4N6DBS5AbKQhoPa5J-w">
</div>
<h1 class="font-headline-md text-headline-md text-on-surface">Inicio de Sesión</h1>
<p class="font-label-md text-label-md text-on-surface-variant mt-1">Accede a tu panel de administración</p>
</div>
<!-- Login Form -->
<form class="px-8 pb-10 space-y-6" onsubmit="event.preventDefault();">
<!-- User Field -->
<div class="space-y-2">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="username">Usuario</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="person">person</span>
<input class="w-full pl-10 pr-4 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface placeholder:text-outline/60" id="username" placeholder="Ingresa tu usuario" type="text">
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-lg text-label-lg text-on-surface-variant" for="password">Contraseña</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-on-surface-variant text-[20px]" data-icon="lock">lock</span>
<input class="w-full pl-10 pr-12 py-3 bg-surface border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all font-body-md text-on-surface placeholder:text-outline/60" id="password" placeholder="••••••••" type="password">
<button class="absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label-md text-label-md text-tertiary hover:text-primary transition-colors cursor-pointer" href="#">
                        ¿Olvidé mi contraseña?
                    </a>
</div>
<!-- Action Button -->
<button class="w-full py-4 bg-secondary-container hover:bg-secondary-fixed text-on-secondary-container font-headline-md text-headline-md-mobile rounded-xl shadow-sm hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                    Entrar
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</form>
</div>
</main>
<!-- Footer Shell -->
<footer class="bg-surface-container-lowest dark:bg-surface-container-low border-t border-outline-variant/10 docked full-width bottom-0">

</footer>
<script>
        // Simple micro-interaction for the login button
        const loginBtn = document.querySelector('button[type="submit"]');
        loginBtn.addEventListener('click', function() {
            this.innerHTML = '<span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span> Iniciando...';
            setTimeout(() => {
                this.innerHTML = 'Entrar <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>';
            }, 2000);
        });

        // Theme sync or cosmetic effects could go here
    </script>




<div class="fixed bottom-8 left-1/2 -translate-x-1/2 z-[100] animate-in fade-in duration-300 flex justify-center w-full">
    
</div>
